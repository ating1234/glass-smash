<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8cc4e0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#4a9ab8" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="crack-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8e8f4" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6ab8d4" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 深色背景 -->
  <rect width="192" height="192" rx="38" fill="#111111"/>

  <!-- 建築外框 -->
  <rect x="28" y="24" width="136" height="148" rx="4" fill="#1a2535" stroke="#2a3f55" stroke-width="1.5"/>

  <!-- 玻璃格 3×3，每格 38×38，間距 4px，起點 (34, 30) -->
  <!-- Row 1 -->
  <rect x="34" y="30" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <rect x="78" y="30" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <rect x="122" y="30" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <!-- Row 2 -->
  <rect x="34" y="74" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <!-- 中間格：破裂 -->
  <rect x="78" y="74" width="38" height="38" rx="3" fill="url(#crack-glass)" stroke="#2a3f55" stroke-width="1"/>
  <rect x="122" y="74" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <!-- Row 3 -->
  <rect x="34" y="118" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <rect x="78" y="118" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>
  <rect x="122" y="118" width="38" height="38" rx="3" fill="url(#glass)" stroke="#2a3f55" stroke-width="1"/>

  <!-- 玻璃高光反射 -->
  <rect x="36" y="32" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="80" y="32" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="124" y="32" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="36" y="76" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="124" y="76" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="36" y="120" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="80" y="120" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>
  <rect x="124" y="120" width="8" height="16" rx="2" fill="white" fill-opacity="0.25"/>

  <!-- 中間格裂紋 -->
  <g stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.85" filter="url(#glow)">
    <line x1="97" y1="93" x2="80" y2="80"/>
    <line x1="97" y1="93" x2="116" y2="78"/>
    <line x1="97" y1="93" x2="116" y2="108"/>
    <line x1="97" y1="93" x2="82" y2="112"/>
    <line x1="97" y1="93" x2="97" y2="74"/>
    <line x1="97" y1="93" x2="78" y2="93"/>
  </g>

  <!-- 右下石頭 emoji -->
  <text x="154" y="178" font-size="28" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">🪨</text>
</svg>
